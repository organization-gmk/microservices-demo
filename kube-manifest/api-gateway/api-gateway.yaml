apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: patient-service
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: 361509912577.dkr.ecr.us-east-2.amazonaws.com/micro-services/api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4004
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: JWT_SECRET
          valueFrom:
            configMapKeyRef:
              name: api-gateway-config
              key: jwt.secret
        # This ensures the property is available even if file mount has issues
        - name: auth.service.url
          valueFrom:
            configMapKeyRef:
              name: api-gateway-config
              key: auth.service.url
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: config
          mountPath: /app/BOOT-INF/classes/application-prod.yml
          subPath: application-prod.yml
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4004
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4004
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: patient-service
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8080  
    targetPort: 4004