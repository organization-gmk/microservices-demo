apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: patient-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:  # ← Move annotations here, under metadata
        secrets-store.csi.k8s.io/rotation-poll-interval: "30s"
    spec:
      serviceAccountName: auth-service-sa
      containers:
      - name: auth-service
        image: 361509912577.dkr.ecr.us-east-2.amazonaws.com/micro-services/auth-service:V0.1.0
        ports:
        - containerPort: 4005
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://auth-db:5432/authdb"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_DB
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: jwt.secret
        - name: JWT_EXPIRATION
          value: "86400000"
        - name: SERVER_PORT
          value: "4005"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        - name: SPRING_SQL_INIT_MODE
          value: "always"
        - name: SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION
          value: "true"
        - name: SPRING_SQL_INIT_DATA_LOCATIONS
          value: "classpath:data.sql"
        - name: SPRING_SQL_INIT_CONTINUE_ON_ERROR
          value: "true"
        - name: AWS_REGION
          value: "us-east-2"
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        # livenessProbe:
        #   httpGet:
        #     path: /actuator/health
        #     port: 4005
        #   initialDelaySeconds: 180
        #   periodSeconds: 10
        #   timeoutSeconds: 5
        #   failureThreshold: 5
        # readinessProbe:
        #   httpGet:
        #     path: /actuator/health
        #     port: 4005
        #   initialDelaySeconds: 180
        #   periodSeconds: 5
        #   timeoutSeconds: 5
        #   failureThreshold: 5
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: auth-service-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: patient-service
spec:
  selector:
    app: auth-service
  ports:
  - port: 4005
    targetPort: 4005