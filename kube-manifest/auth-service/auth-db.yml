apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: patient-service
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      serviceAccountName: auth-service-sa
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
      
      # Password Sync Sidecar - Automatically syncs secret to database
      - name: password-sync
        image: postgres:15
        command:
        - /bin/bash
        - -c
        - |
          echo "🚀 Starting password sync sidecar..."
          while true; do
            # Check if secret file exists
            if [ -f /mnt/secrets/DB_PASSWORD ]; then
              SECRET_PASSWORD=$(cat /mnt/secrets/DB_PASSWORD)
              CURRENT_USER=$(cat /mnt/secrets/DB_USER)
              
              if [ -n "$SECRET_PASSWORD" ] && [ -n "$CURRENT_USER" ]; then
                # Test if current password works
                if PGPASSWORD="$SECRET_PASSWORD" psql -h localhost -U "$CURRENT_USER" -d postgres -c "SELECT 1" 2>/dev/null; then
                  echo "✅ Password is correct at $(date)"
                else
                  echo "🔄 Password mismatch detected. Updating database..."
                  # Use the old password from env to connect and update
                  PGPASSWORD="$POSTGRES_PASSWORD" psql -h localhost -U "$CURRENT_USER" -d postgres -c "ALTER USER $CURRENT_USER WITH PASSWORD '$SECRET_PASSWORD';" 2>/dev/null
                  echo "✅ Database password updated at $(date)"
                fi
              else
                echo "⚠️ Secret files empty or not found"
              fi
            else
              echo "⏳ Waiting for secret file /mnt/secrets/DB_PASSWORD..."
              ls -la /mnt/secrets/ 2>/dev/null || echo "Directory not accessible"
            fi
            sleep 15
          done
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
      
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: auth-service-secrets
  
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: gp2
      resources:
        requests:
          storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: patient-service
spec:
  type: ClusterIP
  selector:
    app: auth-db
  ports:
  - port: 5432
    targetPort: 5432