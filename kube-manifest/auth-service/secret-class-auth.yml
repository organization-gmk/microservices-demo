apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: auth-service-secrets
  namespace: patient-service
spec:
  provider: aws
  parameters:
    region: us-east-2
    objects: |
      - objectName: "auth-service/jwt-secret"  # Change this to your actual secret name
        objectType: secretsmanager
        jmesPath:
          - path: jwt_secret
            objectAlias: JWT_SECRET
      - objectName: "auth-service/db-credentials"  # Change this too
        objectType: secretsmanager
        jmesPath:
          - path: POSTGRES_USER
            objectAlias: DB_USER
          - path: POSTGRES_PASSWORD
            objectAlias: DB_PASSWORD
          - path: POSTGRES_DB
            objectAlias: DB_NAME
  secretObjects:
    - secretName: auth-service-secrets
      type: Opaque
      data:
        - objectName: JWT_SECRET
          key: jwt.secret
        - objectName: DB_USER
          key: POSTGRES_USER
        - objectName: DB_PASSWORD
          key: POSTGRES_PASSWORD
        - objectName: DB_NAME
          key: POSTGRES_DB