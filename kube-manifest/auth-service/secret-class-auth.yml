apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: auth-service-secrets
  namespace: patient-service
spec:
  provider: aws
  parameters:
    region: us-east-2
    objects: |
      - objectName: "auth-service/jwt-secret"
        objectType: secretsmanager
        jmesPath:
          - path: jwt_secret
            objectAlias: JWT_SECRET
      - objectName: "auth-service/db-credentials"  
        objectType: secretsmanager
        jmesPath:
          - path: username
            objectAlias: DB_USERNAME
          - path: password
            objectAlias: DB_PASSWORD
          - path: database
            objectAlias: DB_NAME
  secretObjects:
    - secretName: auth-service-secrets
      type: Opaque
      data:
        - objectName: JWT_SECRET
          key: jwt.secret
        - objectName: DB_USERNAME                    
          key: POSTGRES_USER
        - objectName: DB_PASSWORD                    
          key: POSTGRES_PASSWORD
        - objectName: DB_NAME                        
          key: POSTGRES_DB