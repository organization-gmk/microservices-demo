apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-frontend
  namespace: patient-service
  labels:
    app: patient-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-frontend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: patient-frontend
    spec:
      containers:
      - name: patient-frontend
        image: 361509912577.dkr.ecr.us-east-2.amazonaws.com/micro-services/patient-frontend:V0.0.5
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: patient-frontend
  namespace: patient-service
  labels:
    app: patient-frontend
spec:
  type: ClusterIP
  selector:
    app: patient-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP