apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: patient-service
  labels:
    app: patient-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
      annotations:
        secrets-store.csi.k8s.io/rotation-poll-interval: "30s"
    spec:
      serviceAccountName: patient-service-sa
      containers:
      - name: patient-service
        image: 361509912577.dkr.ecr.us-east-2.amazonaws.com/micro-services/patient-service:V0.0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://patient-service-db:5432/db"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: patient-service-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: patient-service-secrets
              key: DB_PASSWORD
        - name: AWS_REGION
          value: "us-east-2"
        - name: SERVER_PORT
          value: "4000"
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
        resources:
          requests:
            memory: "384Mi"   
            cpu: "200m"        
          limits:
            memory: "768Mi"   
            cpu: "400m" 
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: patient-service-secrets

---
# Horizontal Pod Autoscaler - Adjusted for new resource limits
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-service-hpa
  namespace: patient-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-service
  minReplicas: 1  
  maxReplicas: 3 
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75  

---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: patient-service
  labels:
    app: patient-service
spec:
  type: ClusterIP
  selector:
    app: patient-service
  ports:
  - name: http
    port: 4000
    targetPort: 4000
  - name: debug
    port: 5005
    targetPort: 5005