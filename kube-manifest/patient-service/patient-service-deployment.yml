apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: patient-service
  labels:
    app: patient-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
      - name: patient-service
        image: 361509912577.dkr.ecr.us-east-2.amazonaws.com/micro-services/patient-service:V0.0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
        - containerPort: 5005
          name: debug
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://patient-service-db:5432/db"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        envFrom:
        - configMapRef:
            name: patient-service-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /patients
            port: 4000
          initialDelaySeconds: 90   
          periodSeconds: 10
          failureThreshold: 3        
        readinessProbe:
          httpGet:
            path: /patients
            port: 4000
          initialDelaySeconds: 70    
          periodSeconds: 5
          failureThreshold: 3        