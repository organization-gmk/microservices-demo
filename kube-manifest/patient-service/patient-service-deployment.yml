apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: patient-service
  labels:
    app: patient-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      serviceAccountName: patient-service-sa
      containers:
      - name: patient-service
        image: 361509912577.dkr.ecr.us-east-2.amazonaws.com/micro-services/patient-service:V0.0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
        - containerPort: 5005
          name: debug
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://patient-service-db:5432/$(DB_NAME)"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: patient-service-secrets
              key: POSTGRES_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: patient-service-secrets
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: patient-service-secrets
              key: POSTGRES_DB
        - name: AWS_REGION
          value: "us-east-2"
        envFrom:
        - configMapRef:
            name: patient-service-config
        volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 4000
          initialDelaySeconds: 90
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 4000
          initialDelaySeconds: 70
          periodSeconds: 5
          failureThreshold: 3
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: patient-service-secrets

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-service-hpa
  namespace: patient-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70


---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: patient-service
  labels:
    app: patient-service
spec:
  type: ClusterIP
  selector:
    app: patient-service
  ports:
  - name: http
    port: 4000
    targetPort: 4000
  - name: debug
    port: 5005
    targetPort: 5005