apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: patient-service
type: Opaque
stringData:
  POSTGRES_DB: db
  POSTGRES_USER: admin_user
  POSTGRES_PASSWORD: password
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service-db
  namespace: patient-service
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: patient-service
spec:
  serviceName: patient-service-db
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: postgres  # THIS FIXES THE lost+found ISSUE
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata-postgres-0
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources:
          requests:
            storage: 5Gi