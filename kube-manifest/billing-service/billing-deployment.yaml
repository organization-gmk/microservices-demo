apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: 361509912577.dkr.ecr.us-east-2.amazonaws.com/micro-services/billing-service:V0.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
            - containerPort: 9001
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
