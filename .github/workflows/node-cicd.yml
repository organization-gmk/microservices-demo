name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - patient-management-frontend/**

  workflow_dispatch:
    inputs:
      environment:
        description: "Select deployment environment"
        required: true
        default: "edfx-dev"

permissions:
  id-token: write
  contents: read

env:
  FRONTEND_DIR: patient-management-frontend  
  SERVICE_NAME: patient-frontend

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    environment:  ${{inputs.environment}}

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- NODE SETUP ----------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      # ---------------- INSTALL DEPENDENCIES ----------------
      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      # ---------------- RUN LINTER ----------------
      - name: Run linter
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint || true

      # ---------------- RUN TESTS ----------------
      - name: Run tests
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm test -- --passWithNoTests --coverage
        env:
          CI: true

      # ---------------- BUILD APPLICATION ----------------
      - name: Build application
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          INLINE_RUNTIME_CHUNK: false

      # ---------------- AWS AUTH ----------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- DOCKER CACHE ----------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------- AUTO-INCREMENT VERSION ----------------
      - name: Get next version from ECR
        id: version
        run: |
          echo "Fetching latest version for ${{ env.SERVICE_NAME }} from ECR..."
          
          # Try to get the latest version tag from ECR
          LATEST_VERSION=$(aws ecr describe-images \
            --repository-name micro-services/${{ env.SERVICE_NAME }} \
            --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
            --output text 2>/dev/null || echo "V0.0.0")
          
          echo "Latest version in ECR: $LATEST_VERSION"
          
          # Extract version number and increment patch
          if [[ $LATEST_VERSION =~ V([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="V$MAJOR.$MINOR.$NEW_PATCH"
          else
            # If no valid version found, start at V0.0.1
            NEW_VERSION="V0.0.1"
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version for this build: $NEW_VERSION"
          
          # Store in file for reference
          echo $NEW_VERSION > version-${{ env.SERVICE_NAME }}.txt

      # ---------------- BUILD DOCKER IMAGE ----------------
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          load: true
          push: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ env.SERVICE_NAME }}:${{ steps.version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ env.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------- SECURITY SCAN ----------------
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ env.SERVICE_NAME }}:${{ steps.version.outputs.version }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 0
          format: json
          output: trivy-report-${{ env.SERVICE_NAME }}.json

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ env.SERVICE_NAME }}
          path: trivy-report-${{ env.SERVICE_NAME }}.json

      # ---------------- PUSH IMAGE ----------------
      - name: Push Docker image
        run: |
          echo "Pushing ${{ steps.version.outputs.version }} to ECR..."
          docker push ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ env.SERVICE_NAME }} --all-tags

      # ---------------- UPLOAD VERSION INFO ----------------
      - name: Upload version info
        uses: actions/upload-artifact@v4
        with:
          name: version-${{ env.SERVICE_NAME }}
          path: version-${{ env.SERVICE_NAME }}.txt

    