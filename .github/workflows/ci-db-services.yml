name: DB Services CI/CD

on:
  push:
    branches: [main]
    paths:
      - spring-microservices-patient-mngt/auth-service/**
      - spring-microservices-patient-mngt/patient-service/**
      - spring-microservices-patient-mngt/billing-service/**
      - spring-microservices-patient-mngt/api-gateway/**
      - spring-microservices-patient-mngt/analytics-service/**

  workflow_dispatch:
    inputs:
      environment:
        description: "Select deployment environment"
        required: true
        default: "edfx-dev"

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: "21"
  BASE_DIR: spring-microservices-patient-mngt

jobs:
  build-db-services:
    runs-on: ubuntu-latest
    environment: ${{inputs.environment}}

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - patient-service
          - billing-service
          - api-gateway
          - analytics-service

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- JAVA + MAVEN CACHE ----------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # ---------------- OWASP CACHE ----------------
      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-${{ runner.os }}-v1
          restore-keys: |
            owasp-${{ runner.os }}-

      # ---------------- CODE QUALITY ----------------
      - name: Checkstyle
        run: |
          cd $BASE_DIR/${{ matrix.service }}
          mvn checkstyle:check -Dcheckstyle.failOnViolation=false

      - name: OWASP Dependency Check
        run: |
          cd $BASE_DIR/${{ matrix.service }}
          mvn org.owasp:dependency-check-maven:12.2.0:check \
          -Dnvd.api.key=${{ secrets.NVD_API_KEY }} \
          -Dnvd.api.delay=2000 \
          -DfailOnError=false

      # ---------------- TESTS ----------------
      - name: Run tests
        run: |
          cd $BASE_DIR/${{ matrix.service }}
          mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      # ---------------- SONAR ----------------
      - name: SonarCloud Scan
        run: |
          cd java-spring-microservices/${{ matrix.service }}
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_ORGANIZATION }}-${{ matrix.service }} \
            -Dsonar.projectName=${{ matrix.service }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # ---------------- AWS AUTH ----------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- DOCKER CACHE ----------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------- AUTO-INCREMENT VERSION ----------------
      - name: Get next version from ECR
        id: version
        run: |
          echo "Fetching latest version for ${{ matrix.service }} from ECR..."
          
          # Try to get the latest version tag from ECR
          LATEST_VERSION=$(aws ecr describe-images \
            --repository-name micro-services/${{ matrix.service }} \
            --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
            --output text 2>/dev/null || echo "V0.0.0")
          
          echo "Latest version in ECR: $LATEST_VERSION"
          
          # Extract version number and increment patch
          if [[ $LATEST_VERSION =~ V([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="V$MAJOR.$MINOR.$NEW_PATCH"
          else
            # If no valid version found, start at V0.0.1
            NEW_VERSION="V0.0.1"
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version for this build: $NEW_VERSION"
          
          # Store in file for reference
          echo $NEW_VERSION > version-${{ matrix.service }}.txt

      # ---------------- BUILD WITH AUTO-INCREMENTED VERSION ----------------
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BASE_DIR }}/${{ matrix.service }}
          load: true
          push: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ matrix.service }}:${{ steps.version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------- SECURITY SCAN ----------------
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ matrix.service }}:${{ steps.version.outputs.version }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 0        
          format: json
          output: trivy-report-${{ matrix.service }}.json

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-report-${{ matrix.service }}.json

      # ---------------- PUSH IMAGE ----------------
      - name: Push Docker image
        run: |
          echo "Pushing ${{ steps.version.outputs.version }} to ECR..."
          docker push ${{ steps.login-ecr.outputs.registry }}/micro-services/${{ matrix.service }} --all-tags
          
      # ---------------- UPLOAD VERSION INFO ----------------
      - name: Upload version info
        uses: actions/upload-artifact@v4
        with:
          name: version-${{ matrix.service }}
          path: version-${{ matrix.service }}.txt